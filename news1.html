<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMIKAGI - News</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
text-transform:uppercase;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
background:#0d0d0d;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
z-index:1000;
}

.logo a{
color:white;
font-size:14px;
font-weight:bold;
text-decoration:none;
}

/* NAVIGATION */

nav ul{
list-style:none;
display:flex;
gap:15px;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:13px;
padding:6px 10px;
border-radius:25px;
transition:0.3s;
}

nav ul li a:hover{
background:#00c3ff;
color:black;
}

/* HAMBURGER */

.menu-toggle{
display:none;
font-size:28px;
color:white;
cursor:pointer;
}

/* CONTENT */

.overlay{
flex:1;
background:rgba(0,0,0,0.75);
color:white;
padding:140px 60px 40px 60px;
}

.overlay h1{
font-size:42px;
margin-bottom:30px;
}

/* PDF AREA */

.pdf-container{
background:white;
padding:20px;
}

.download-btn{
display:inline-block;
margin-bottom:15px;
padding:10px 20px;
background:#00c3ff;
color:black;
text-decoration:none;
font-size:16px;
border-radius:5px;
font-weight:bold;
}

.download-btn:hover{
background:black;
color:white;
}

iframe{
border:none;
}

/* FOOTER (styled same as Services page) */

footer{
margin-top:60px;
background:#000;
color:white;
padding:20px 5%;
font-size:12px;
text-align:center;
}

footer a{
color:#00c3ff;
text-decoration:none;
}

footer a:hover{
text-decoration:underline;
}

/* MOBILE */

@media(max-width:768px){

header{
padding:15px 5%;
}

nav{
position:absolute;
top:70px;
left:0;
width:100%;
background:rgba(0,0,0,0.95);
max-height:0;
overflow:hidden;
transition:max-height 0.5s ease;
}

nav.active{
max-height:500px;
}

nav ul{
flex-direction:column;
padding:10px 0;
}

nav ul li{
text-align:center;
}

nav ul li a{
padding:15px;
display:block;
}

.menu-toggle{
display:block;
}

.overlay{
padding:120px 20px 30px 20px;
}

.overlay h1{
font-size:28px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
<a href="index.html">COOPERATIVE MINIERE KABABARA ET GIKINGO</a>
</div>

<div class="menu-toggle" id="menuToggle">☰</div>

<nav id="navMenu">
<ul>
<li><a href="home.html">HOME</a></li>
<li><a href="about.html">ABOUT US</a></li>
<li><a href="services.html">SERVICES</a></li>
<li><a href="our_work.html">OUR WORK</a></li>
<li><a href="publication.html">PUBLICATION</a></li>
<li><a href="news1.html">NEWS</a></li>
<li><a href="contact.html">CONTACTS</a></li>
</ul>
</nav>

</header>

<div class="overlay">

<h1>LATEST NEWS</h1>

<div class="pdf-container">

<a href="news.pdf" download class="download-btn">
Download News PDF
</a>

<iframe src="news.pdf" width="100%" height="800px"></iframe>

</div>

</div>

<footer>
© 2026 COMIKAGI - COOPERATIVE MINIERE KABABARA ET GIKINGO |
<a href="privacy_policy.html">PRIVACY POLICY</a>
</footer>

<script>

const menuToggle=document.getElementById("menuToggle");
const navMenu=document.getElementById("navMenu");
const navLinks=document.querySelectorAll("nav ul li a");

menuToggle.addEventListener("click",()=>{
navMenu.classList.toggle("active");
menuToggle.textContent=navMenu.classList.contains("active")?"✕":"☰";
});

navLinks.forEach(link=>{
link.addEventListener("click",()=>{
navMenu.classList.remove("active");
menuToggle.textContent="☰";
});
});

</script>

</body>
</html>
